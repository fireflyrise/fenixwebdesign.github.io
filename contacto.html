<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #ffffff;
            padding: 20px;
        }

        .form-container {
            max-width: 100%;
            margin: 0 auto;
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Open Sans', sans-serif;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            outline: none;
            border-color: #ff7200;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #ff7200;
            color: white;
        }

        .btn-primary:hover {
            background-color: #ffae00;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #d0d0d0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-indicator {
            width: 100%;
            margin-bottom: 30px;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: #ff7200;
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 4px;
        }

        .progress-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            font-weight: 600;
        }

        .success-message {
            text-align: center;
            padding: 40px 20px;
        }

        .success-message i {
            font-size: 60px;
            color: #4CAF50;
            margin-bottom: 20px;
        }

        .success-message h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .success-message p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
        }

        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="form-container">
        <div class="progress-indicator">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
            <div class="progress-text" id="progressText">Paso 1 de 2</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="contactForm">
            <div class="form-step active" data-step="1">
                <div class="form-group">
                    <label for="details">Cuéntanos en qué necesitas ayuda *</label>
                    <textarea
                        id="details"
                        name="details"
                        placeholder="Por favor describe tus necesidades, objetivos o cualquier pregunta que tengas..."
                        required
                    ></textarea>
                </div>

                <div class="form-buttons">
                    <button type="button" class="btn btn-primary" onclick="nextStep()">Siguiente</button>
                </div>
            </div>

            <div class="form-step" data-step="2">
                <div class="form-group">
                    <label for="name">Nombre Completo *</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Juan Pérez"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="phone">Número de Teléfono *</label>
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        placeholder="(555) 555-5555"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico *</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="juan@ejemplo.com"
                        required
                    >
                </div>

                <div class="form-buttons">
                    <button type="button" class="btn btn-secondary" onclick="prevStep()">Atrás</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Enviar</button>
                </div>
            </div>

            <div class="form-step" data-step="success">
                <div class="success-message">
                    <i class="fas fa-check-circle"></i>
                    <h2>¡Gracias!</h2>
                    <p>Hemos recibido tu información y nos pondremos en contacto contigo pronto.</p>
                </div>
            </div>
        </form>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 2;

        function formatPhoneNumber(value) {
            if (!value) return value;
            const phoneNumber = value.replace(/[^\d]/g, '');
            const phoneNumberLength = phoneNumber.length;
            if (phoneNumberLength < 4) return phoneNumber;
            if (phoneNumberLength < 7) {
                return `(${phoneNumber.slice(0, 3)}) ${phoneNumber.slice(3)}`;
            }
            return `(${phoneNumber.slice(0, 3)}) ${phoneNumber.slice(3, 6)}-${phoneNumber.slice(6, 10)}`;
        }

        document.getElementById('phone').addEventListener('input', function(e) {
            const formattedInputValue = formatPhoneNumber(e.target.value);
            e.target.value = formattedInputValue;
        });

        function updateProgress() {
            const progressPercentage = (currentStep / totalSteps) * 100;
            document.getElementById('progressBarFill').style.width = progressPercentage + '%';
            document.getElementById('progressText').textContent = `Paso ${currentStep} de ${totalSteps}`;
        }

        function validateStep(step) {
            const stepElement = document.querySelector(`.form-step[data-step="${step}"]`);
            const inputs = stepElement.querySelectorAll('input[required], textarea[required]');
            let isValid = true;
            let errorMsg = '';

            inputs.forEach(input => {
                if (!input.value.trim()) {
                    isValid = false;
                    errorMsg = 'Por favor completa todos los campos requeridos.';
                    input.style.borderColor = '#c62828';
                } else {
                    input.style.borderColor = '#e0e0e0';
                }

                if (input.type === 'email' && input.value.trim()) {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(input.value)) {
                        isValid = false;
                        errorMsg = 'Por favor ingresa un correo electrónico válido.';
                        input.style.borderColor = '#c62828';
                    }
                }

                if (input.type === 'tel' && input.value.trim()) {
                    const phoneRegex = /^[\d\s\-\(\)]+$/;
                    if (!phoneRegex.test(input.value) || input.value.replace(/\D/g, '').length < 10) {
                        isValid = false;
                        errorMsg = 'Por favor ingresa un número de teléfono válido.';
                        input.style.borderColor = '#c62828';
                    }
                }
            });

            const errorMessageEl = document.getElementById('errorMessage');
            if (!isValid) {
                errorMessageEl.textContent = errorMsg;
                errorMessageEl.classList.add('show');
            } else {
                errorMessageEl.classList.remove('show');
            }

            return isValid;
        }

        function nextStep() {
            if (!validateStep(currentStep)) {
                return;
            }

            if (currentStep < totalSteps) {
                document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.remove('active');
                currentStep++;
                document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.add('active');
                updateProgress();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.remove('active');
                currentStep--;
                document.querySelector(`.form-step[data-step="${currentStep}"]`).classList.add('active');
                updateProgress();
                document.getElementById('errorMessage').classList.remove('show');
            }
        }

        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!validateStep(currentStep)) {
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';

            const formData = {
                details: document.getElementById('details').value,
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                submitted_at: new Date().toISOString()
            };

            try {
                const response = await fetch('https://connect.pabbly.com/workflow/sendwebhookdata/IjU3NjYwNTY1MDYzMTA0MzE1MjZiNTUzNjUxMzYi_pc', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    document.querySelectorAll('.form-step').forEach(step => {
                        step.classList.remove('active');
                    });
                    document.querySelector('.form-step[data-step="success"]').classList.add('active');
                    document.querySelector('.progress-indicator').style.display = 'none';
                } else {
                    throw new Error('Submission failed');
                }
            } catch (error) {
                const errorMessageEl = document.getElementById('errorMessage');
                errorMessageEl.textContent = 'Hubo un error al enviar tu formulario. Por favor intenta de nuevo o llámanos directamente.';
                errorMessageEl.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar';
            }
        });

        updateProgress();
    </script>
</body>
</html>
